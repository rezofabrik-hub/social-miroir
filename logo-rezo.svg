<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="16" fill="#00AEEF"/>
  <!-- P/R monogram geometric -->
  <g fill="#1a1a2e">
    <!-- Left vertical bar -->
    <rect x="18" y="18" width="10" height="64" rx="2"/>
    <!-- Top horizontal bar -->
    <rect x="18" y="18" width="42" height="10" rx="2"/>
    <!-- Middle horizontal bar -->
    <rect x="18" y="44" width="36" height="9" rx="2"/>
    <!-- Top right curve (P bowl) - right bar -->
    <rect x="50" y="18" width="10" height="35" rx="2"/>
    <!-- Diagonal leg of R -->
    <polygon points="36,53 46,53 68,82 56,82"/>
  </g>
</svg>
